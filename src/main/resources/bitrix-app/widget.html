<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Обращение</title>
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <style>
        :root {
            font-family: Inter, Arial, sans-serif;
            color: #172033;
            background: transparent;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
        }

        body {
            min-height: 120px;
        }

        .widget-wrap {
            width: 100%;
            padding: 8px;
        }

        .widget-card {
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            padding: 14px 16px 16px;
            box-shadow: 0 8px 24px rgba(23, 32, 51, 0.12);
        }

        .eyebrow {
            color: #7b879a;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 8px;
        }

        .company-title {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 800;
            line-height: 1.15;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .meta {
            color: #5f6f86;
            font-size: 14px;
            line-height: 1.45;
            margin-bottom: 14px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #eef5fb;
            color: #285680;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .02em;
            margin-bottom: 10px;
        }

        .action {
            width: 100%;
            min-height: 46px;
            border: 0;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            color: #fff;
            transition: transform .12s ease, opacity .12s ease, box-shadow .12s ease;
        }

        .action:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(23, 32, 51, 0.14);
        }

        .action:disabled {
            opacity: .6;
            cursor: wait;
            transform: none;
            box-shadow: none;
        }

        .action.close { background: #18a8e1; }
        .action.delete { background: #e9505b; }

        .message {
            margin-top: 12px;
            padding: 11px 12px;
            border-radius: 12px;
            background: #f4f7fb;
            color: #526077;
            font-size: 13px;
            line-height: 1.45;
        }

        .message.error {
            background: #fff1f1;
            color: #9d3030;
        }

        .message.success {
            background: #edf9f1;
            color: #277247;
        }

        .loading-card,
        .empty-card,
        .error-card {
            text-align: center;
        }

        .loading-title,
        .empty-title,
        .error-title {
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: 800;
            line-height: 1.25;
        }

        .spinner {
            width: 22px;
            height: 22px;
            margin: 8px auto 14px;
            border: 3px solid #dce7ef;
            border-top-color: #18a8e1;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        .loading-text {
            color: #6b778c;
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<main id="root" class="widget-wrap"></main>
<script>
    const root = document.getElementById('root');
    let session = null;
    let currentContext = null;

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function renderLoading() {
        root.innerHTML = `
            <section class="widget-card loading-card">
                <div class="spinner"></div>
                <div class="loading-title">Загружаю обращение…</div>
                <div class="loading-text">Секунду, получаю статус и доступные действия.</div>
            </section>`;
        resize('LOADING');
    }

    async function postJson(path, payload) {
        const response = await fetch(path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            credentials: 'same-origin'
        });
        if (!response.ok) {
            let message = 'HTTP ' + response.status;
            try {
                const data = await response.json();
                message = data.detail || data.message || data.error || message;
            } catch (_) {
                const text = await response.text();
                if (text) message = text;
            }
            throw new Error(message);
        }
        return response.json();
    }

    function buildSession() {
        const placement = BX24.placement.info();
        const auth = BX24.getAuth();
        const options = placement && placement.options ? placement.options : {};
        const dialogId = options.dialogId || options.DIALOG_ID;
        const domain = auth.domain || auth.DOMAIN;
        const memberId = auth.member_id || auth.memberId || auth.MEMBER_ID || '';
        const accessToken = auth.access_token || auth.accessToken || auth.AUTH_ID;

        if (!dialogId || !domain || !accessToken) {
            throw new Error('Bitrix24 не передал контекст чата или авторизацию приложения');
        }
        return { dialogId, domain, memberId, accessToken };
    }

    async function loadContext(message, messageType) {
        try {
            if (!session) session = buildSession();
            currentContext = await postJson('/api/bitrix/widget/context', session);
            render(currentContext, message, messageType);
        } catch (error) {
            renderError(error.message || String(error));
        }
    }

    function render(context, message, messageType) {
        const ticket = context.ticket;
        if (!ticket) {
            root.innerHTML = `
                <section class="widget-card empty-card">
                    <div class="eyebrow">B24 Support</div>
                    <div class="empty-title">Нет активного обращения</div>
                    <div class="message">${escapeHtml(context.message)}</div>
                </section>`;
            resize('EMPTY');
            return;
        }

        const button = context.available && context.buttonLabel
            ? `<button id="actionButton" class="action ${context.action === 'DELETE' ? 'delete' : 'close'}" type="button">${escapeHtml(context.buttonLabel)}</button>`
            : '';
        const feedback = message
            ? `<div class="message ${messageType || ''}">${escapeHtml(message)}</div>`
            : `<div class="message">${escapeHtml(context.message)}</div>`;

        root.innerHTML = `
            <section class="widget-card">
                <div class="eyebrow">Обращение #${escapeHtml(ticket.id)}</div>
                <h1 class="company-title">${escapeHtml(ticket.clientTitle || ticket.chatTitle)}</h1>
                <div class="status-badge">Статус: ${escapeHtml(ticket.status)}</div>
                <div class="meta">Сотрудник: ${escapeHtml(context.currentUserName)}</div>
                ${button}
                ${feedback}
            </section>`;

        const actionButton = document.getElementById('actionButton');
        if (actionButton) actionButton.addEventListener('click', executeAction);
        resize(ticket.status);
    }

    async function executeAction() {
        const action = currentContext.action;
        const question = action === 'DELETE'
            ? 'Удалить этот чат у всех специалистов техподдержки?'
            : 'Закрыть обращение и отправить клиенту уведомление о выполнении?';
        if (!window.confirm(question)) return;

        const button = document.getElementById('actionButton');
        if (button) {
            button.disabled = true;
            button.textContent = action === 'DELETE' ? 'Удаляю чат…' : 'Закрываю обращение…';
        }

        try {
            const result = await postJson('/api/bitrix/widget/action', { ...session, action });
            await loadContext(result.message, result.success ? 'success' : 'error');
            if (result.success && action === 'DELETE') {
                window.setTimeout(() => {
                    if (typeof BX24.closeApplication === 'function') BX24.closeApplication();
                }, 1200);
            }
        } catch (error) {
            await loadContext(error.message || String(error), 'error');
        }
    }

    function renderError(message) {
        root.innerHTML = `
            <section class="widget-card error-card">
                <div class="eyebrow">B24 Support</div>
                <div class="error-title">Действие недоступно</div>
                <div class="message error">${escapeHtml(message)}</div>
            </section>`;
        resize('ERROR');
    }

    function resize(state) {
        const applySize = () => {
            const scrollSize = typeof BX24.getScrollSize === 'function'
                ? BX24.getScrollSize()
                : { scrollWidth: document.documentElement.scrollWidth, scrollHeight: document.documentElement.scrollHeight };

            const width = Math.max(500, Number(scrollSize.scrollWidth || 0) + 8);
            const minHeight = state === 'OPEN' ? 255
                : state === 'CLOSED' ? 225
                    : 175;
            const height = Math.max(minHeight, Number(scrollSize.scrollHeight || 0) + 8);

            if (typeof BX24.resizeWindow === 'function') {
                BX24.resizeWindow(width, height);
            }
            if (typeof BX24.fitWindow === 'function') {
                BX24.fitWindow();
            }
        };

        // The IM_TEXTAREA container is created by Bitrix24. Give it one render frame
        // before measuring the card, then repeat after fonts/layout have settled.
        window.requestAnimationFrame(applySize);
        window.setTimeout(applySize, 120);
    }

    BX24.ready(() => {
        renderLoading();
        BX24.init(() => loadContext());
    });
</script>
</body>
</html>
