<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Обращение</title>
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <style>
        :root {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            color: #333c48;
            background: transparent;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
        }

        body { min-height: 120px; }

        .widget-wrap {
            width: 100%;
            padding: 8px;
        }

        .widget-card {
            width: 100%;
            min-width: 0;
            background: #ffffff;
            border: 1px solid rgba(82, 92, 105, 0.12);
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.12);
        }

        .header-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .title-block {
            min-width: 0;
            flex: 1 1 auto;
        }

        .eyebrow {
            color: #8b96a6;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: .055em;
            margin-bottom: 5px;
        }

        .company-title {
            margin: 0;
            color: #333c48;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.3;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .status-badge {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #eaf5fc;
            color: #2b6f94;
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            white-space: nowrap;
        }

        .meta {
            color: #828b98;
            font-size: 12px;
            line-height: 1.35;
            margin: -4px 0 12px;
        }

        .action {
            width: 100%;
            min-height: 40px;
            border: 0;
            border-radius: 9px;
            padding: 9px 14px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
            cursor: pointer;
            color: #fff;
            transition: filter .12s ease, opacity .12s ease;
        }

        .action:hover { filter: brightness(.97); }

        .action:disabled {
            opacity: .6;
            cursor: wait;
            filter: none;
        }

        .action.close { background: #2fc6f6; }
        .action.delete { background: #e95b63; }

        .message {
            margin-top: 10px;
            padding: 9px 11px;
            border-radius: 9px;
            background: #f4f7f9;
            color: #687482;
            font-size: 12px;
            line-height: 1.4;
        }

        .message.error {
            background: #fff0f0;
            color: #a23636;
        }

        .message.success {
            background: #edf9f1;
            color: #277247;
        }

        .center-card { text-align: center; }

        .state-title {
            margin: 0 0 7px;
            color: #333c48;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
        }

        .spinner {
            width: 20px;
            height: 20px;
            margin: 5px auto 11px;
            border: 3px solid #dce7ef;
            border-top-color: #2fc6f6;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        .loading-text {
            color: #828b98;
            font-size: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<main id="root" class="widget-wrap"></main>
<script>
    const root = document.getElementById('root');
    let session = null;
    let currentContext = null;

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function renderLoading() {
        root.innerHTML = `
            <section class="widget-card center-card">
                <div class="spinner"></div>
                <div class="state-title">Загружаю обращение…</div>
                <div class="loading-text">Получаю статус и доступные действия.</div>
            </section>`;
        resize('LOADING');
    }

    async function postJson(path, payload) {
        const response = await fetch(path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            credentials: 'same-origin'
        });
        if (!response.ok) {
            let message = 'HTTP ' + response.status;
            try {
                const data = await response.json();
                message = data.detail || data.message || data.error || message;
            } catch (_) {
                const text = await response.text();
                if (text) message = text;
            }
            throw new Error(message);
        }
        return response.json();
    }

    function buildSession() {
        const placement = BX24.placement.info();
        const auth = BX24.getAuth();
        const options = placement && placement.options ? placement.options : {};
        const dialogId = options.dialogId || options.DIALOG_ID;
        const domain = auth.domain || auth.DOMAIN;
        const memberId = auth.member_id || auth.memberId || auth.MEMBER_ID || '';
        const accessToken = auth.access_token || auth.accessToken || auth.AUTH_ID;

        if (!dialogId || !domain || !accessToken) {
            throw new Error('Bitrix24 не передал контекст чата или авторизацию приложения');
        }
        return { dialogId, domain, memberId, accessToken };
    }

    async function loadContext(message, messageType) {
        try {
            if (!session) session = buildSession();
            currentContext = await postJson('/api/bitrix/widget/context', session);
            render(currentContext, message, messageType);
        } catch (error) {
            renderError(error.message || String(error));
        }
    }

    function render(context, message, messageType) {
        const ticket = context.ticket;
        if (!ticket) {
            root.innerHTML = `
                <section class="widget-card center-card">
                    <div class="eyebrow">B24 Support</div>
                    <div class="state-title">Нет активного обращения</div>
                    <div class="message">${escapeHtml(context.message)}</div>
                </section>`;
            resize('EMPTY');
            return;
        }

        const button = context.available && context.buttonLabel
            ? `<button id="actionButton" class="action ${context.action === 'DELETE' ? 'delete' : 'close'}" type="button">${escapeHtml(context.buttonLabel)}</button>`
            : '';

        // Обычное пояснение backend не выводим постоянно: в компактном виджете
        // показываем сообщение только после выполненного действия или при ошибке.
        const feedback = message
            ? `<div class="message ${messageType || ''}">${escapeHtml(message)}</div>`
            : (!context.available && context.message
                ? `<div class="message">${escapeHtml(context.message)}</div>`
                : '');

        root.innerHTML = `
            <section class="widget-card">
                <div class="header-row">
                    <div class="title-block">
                        <div class="eyebrow">Обращение #${escapeHtml(ticket.id)}</div>
                        <h1 class="company-title">${escapeHtml(ticket.clientTitle || ticket.chatTitle)}</h1>
                    </div>
                    <div class="status-badge">${escapeHtml(ticket.status)}</div>
                </div>
                <div class="meta">Сотрудник: ${escapeHtml(context.currentUserName)}</div>
                ${button}
                ${feedback}
            </section>`;

        const actionButton = document.getElementById('actionButton');
        if (actionButton) actionButton.addEventListener('click', executeAction);
        resize(ticket.status);
    }

    async function executeAction() {
        const action = currentContext.action;
        const button = document.getElementById('actionButton');
        if (button) {
            button.disabled = true;
            button.textContent = action === 'DELETE' ? 'Удаляю чат…' : 'Закрываю обращение…';
        }

        try {
            const result = await postJson('/api/bitrix/widget/action', { ...session, action });
            await loadContext(result.message, result.success ? 'success' : 'error');
            if (result.success && action === 'DELETE') {
                window.setTimeout(() => {
                    if (typeof BX24.closeApplication === 'function') BX24.closeApplication();
                }, 1200);
            }
        } catch (error) {
            await loadContext(error.message || String(error), 'error');
        }
    }

    function renderError(message) {
        root.innerHTML = `
            <section class="widget-card center-card">
                <div class="eyebrow">B24 Support</div>
                <div class="state-title">Действие недоступно</div>
                <div class="message error">${escapeHtml(message)}</div>
            </section>`;
        resize('ERROR');
    }

    function resize(state) {
        const applySize = () => {
            const scrollSize = typeof BX24.getScrollSize === 'function'
                ? BX24.getScrollSize()
                : {
                    scrollWidth: document.documentElement.scrollWidth,
                    scrollHeight: document.documentElement.scrollHeight
                };

            const width = 500;
            const minHeight = state === 'OPEN' || state === 'CLOSED' ? 175 : 145;
            const height = Math.max(minHeight, Number(scrollSize.scrollHeight || 0) + 8);

            if (typeof BX24.resizeWindow === 'function') {
                BX24.resizeWindow(width, height);
            }
            if (typeof BX24.fitWindow === 'function') {
                BX24.fitWindow();
            }
        };

        window.requestAnimationFrame(applySize);
        window.setTimeout(applySize, 120);
    }

    BX24.ready(() => {
        renderLoading();
        BX24.init(() => loadContext());
    });
</script>
</body>
</html>
