<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>B24 Support — установка кнопки</title>
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <style>
        :root { font-family: Inter, Arial, sans-serif; color: #172033; background: #f4f7fb; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 32px; }
        .card { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 18px; padding: 30px; box-shadow: 0 18px 50px rgba(29, 52, 96, .12); }
        h1 { margin: 0 0 12px; font-size: 26px; }
        p { line-height: 1.55; color: #536178; }
        .button { border: 0; border-radius: 10px; padding: 13px 20px; font-weight: 700; font-size: 15px; cursor: pointer; color: white; background: #2fc6f6; }
        .button:disabled { opacity: .55; cursor: wait; }
        .status { margin-top: 18px; padding: 14px 16px; border-radius: 10px; background: #edf8ff; color: #245270; white-space: pre-wrap; }
        .status.error { background: #fff0f0; color: #9c2f2f; }
        code { background: #f1f4f8; border-radius: 5px; padding: 2px 6px; }
    </style>
</head>
<body>
<main class="card">
    <h1>Кнопка управления обращением</h1>
    <p>Установщик зарегистрирует пункт <b>«Обращение»</b> над полем ввода в групповых чатах Bitrix24. В чатах техподдержки внутри него будет показываться одна актуальная кнопка: <b>«Обращение закрыто»</b> или <b>«Удалить чат»</b>.</p>
    <p>Обработчик: <code id="handlerUrl"></code></p>
    <button id="installButton" class="button" type="button">Установить / обновить кнопку</button>
    <div id="status" class="status">Ожидаю инициализацию Bitrix24…</div>
</main>
<script>
    const handlerUrl = window.location.origin + '/bitrix/app/widget';
    const button = document.getElementById('installButton');
    const statusBox = document.getElementById('status');
    document.getElementById('handlerUrl').textContent = handlerUrl;

    function setStatus(text, error = false) {
        statusBox.textContent = text;
        statusBox.classList.toggle('error', error);
    }

    function callMethod(method, params) {
        return new Promise((resolve, reject) => {
            BX24.callMethod(method, params || {}, result => {
                if (result.error()) {
                    reject(new Error(result.error_description() || result.error()));
                    return;
                }
                resolve(result.data());
            });
        });
    }

    async function installWidget() {
        button.disabled = true;
        setStatus('Проверяю существующую встройку…');
        try {
            const handlers = await callMethod('placement.get', {});
            const existing = Array.isArray(handlers)
                ? handlers.filter(item => item.placement === 'IM_TEXTAREA' && normalizeUrl(item.handler) === normalizeUrl(handlerUrl))
                : [];

            for (const item of existing) {
                setStatus('Обновляю существующую встройку…');
                await callMethod('placement.unbind', {
                    PLACEMENT: 'IM_TEXTAREA',
                    HANDLER: item.handler
                });
            }

            setStatus('Регистрирую широкое окно обращения над полем ввода…');
            await callMethod('placement.bind', {
                PLACEMENT: 'IM_TEXTAREA',
                HANDLER: handlerUrl,
                TITLE: 'Обращение',
                LANG_ALL: {
                    ru: { TITLE: 'Обращение' },
                    en: { TITLE: 'Support ticket' }
                },
                OPTIONS: {
                    iconName: 'support-ticket',
                    context: 'CHAT',
                    role: 'USER',
                    extranet: 'N',
                    color: 'LIGHT_BLUE',
                    width: 500,
                    height: 220
                }
            });

            setStatus('Кнопка установлена. Завершаю установку приложения…');
            BX24.installFinish();
            setStatus('Готово. Размер окна обновлён: широкая компактная карточка. Закройте открытый виджет, обновите Bitrix24 и снова нажмите пункт «Обращение».');
            button.disabled = false;
        } catch (error) {
            setStatus('Ошибка установки: ' + (error.message || error), true);
            button.disabled = false;
        }
    }

    function normalizeUrl(value) {
        return String(value || '').replace(/\/+$/, '').toLowerCase();
    }

    BX24.ready(() => {
        BX24.init(() => {
            setStatus('Bitrix24 готов. Нажмите кнопку установки.');
            button.addEventListener('click', installWidget);
        });
    });
</script>
</body>
</html>
