server.port=${SERVER_PORT:8088}
server.forward-headers-strategy=framework
server.tomcat.threads.max=32
server.tomcat.threads.min-spare=4

spring.application.name=b24-support

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/b24_support}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:b24_support}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:b24_support_dev_password}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

app.application-name=B24 Support
app.public-base-url=${APP_PUBLIC_BASE_URL:https://b24support.abs7.ru:8443}
